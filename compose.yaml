services:
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - nutrition

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nutrition

  migrate:
    build:
      context: .
      target: migrate
    profiles: ["maintenance"]
    env_file: .env.production
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - nutrition

networks:
  nutrition:

volumes:
  caddy_data:
  caddy_config:
